<!DOCTYPE html>
<html>
<head>
    <title>Mobile Shop</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:#007bff;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#333;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
        }

        .container{
            width:90%;
            margin:auto;
            padding:20px;
        }

        .phones{
            display:flex;
            justify-content:space-around;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            width:300px;
            margin:15px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            text-align:center;
            padding:15px;
        }

        .card img{
            width:100%;
            height:250px;
            border-radius:10px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Mobile Phone Shop</h1>
    <p>Latest Smartphones at Best Prices</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Mobiles</a>
    <a href="#">Offers</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <h2 align="center">Featured Mobiles</h2>

    <div class="phones">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" alt="iPhone">
            <h3>iPhone 15</h3>
            <p>Price: ₹79,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97" alt="Samsung">
            <h3>Samsung Galaxy</h3>
            <p>Price: ₹69,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1580910051074-3eb694886505" alt="OnePlus">
            <h3>OnePlus 12</h3>
            <p>Price: ₹54,999</p>
            <button>Buy Now</button>
        </div>

    </div>

</div>

<footer>
    <p>© 2026 Mobile Phone Shop</p>
</footer>

</body>
</html>
